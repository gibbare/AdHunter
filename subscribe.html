<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ad Monitor – Prenumerera</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 20px; background: #0f0f0f; color: #f0f0f0; }
    h1   { font-size: 1.3rem; margin-bottom: 0.3rem; }
    p    { color: #aaa; font-size: 0.9rem; margin-top: 0; }
    button {
      width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #btn-sub   { background: #4ade80; color: #000; }
    #btn-unsub { background: #f87171; color: #000; margin-top: 10px; }
    #status    { margin-top: 16px; font-size: 0.85rem; color: #aaa; text-align: center; }
  </style>
</head>
<body>
  <h1>📦 Ad Monitor</h1>
  <p>Prenumerera för att få push-notiser direkt till den här enheten när en ny annons dyker upp.</p>

  <button id="btn-sub">Aktivera notiser</button>
  <button id="btn-unsub" style="display:none">Avaktivera notiser</button>
  <div id="status"></div>

  <script>
    const WORKER_URL  = 'https://aurora-push.gibbare.workers.dev';
    const VAPID_KEY   = 'ERSÄTT_MED_DIN_VAPID_PUBLIC_KEY';
    const SW_URL      = 'ad-sw.js';

    const btnSub   = document.getElementById('btn-sub');
    const btnUnsub = document.getElementById('btn-unsub');
    const status   = document.getElementById('status');

    function setStatus(msg) { status.textContent = msg; }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw     = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    async function getRegistration() {
      return navigator.serviceWorker.register(SW_URL);
    }

    async function checkState() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        setStatus('Push-notiser stöds inte i den här webbläsaren.');
        btnSub.disabled = true;
        return;
      }
      const reg  = await getRegistration();
      const sub  = await reg.pushManager.getSubscription();
      if (sub) {
        btnSub.style.display   = 'none';
        btnUnsub.style.display = 'block';
        setStatus('✅ Notiser är aktiverade på den här enheten.');
      } else {
        btnSub.style.display   = 'block';
        btnUnsub.style.display = 'none';
        setStatus('Notiser är inte aktiverade.');
      }
    }

    btnSub.addEventListener('click', async () => {
      btnSub.disabled = true;
      setStatus('Aktiverar...');
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { setStatus('Notiser nekades av webbläsaren.'); btnSub.disabled = false; return; }

        const reg = await getRegistration();
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_KEY),
        });
        await fetch(`${WORKER_URL}/subscribe-ads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscription: sub }),
        });
        await checkState();
      } catch (e) {
        setStatus('Fel: ' + e.message);
        btnSub.disabled = false;
      }
    });

    btnUnsub.addEventListener('click', async () => {
      btnUnsub.disabled = true;
      setStatus('Avaktiverar...');
      try {
        const reg = await getRegistration();
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await fetch(`${WORKER_URL}/unsubscribe-ads`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subscription: sub }),
          });
          await sub.unsubscribe();
        }
        await checkState();
      } catch (e) {
        setStatus('Fel: ' + e.message);
        btnUnsub.disabled = false;
      }
    });

    checkState();
  </script>
</body>
</html>
